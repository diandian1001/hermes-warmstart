<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warmstart — 场景智能画像</title>
<style>
  :root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e1e4eb;--sub:#8b8fa3;--a1:#7c5cfc;--a2:#f59e0b;--a3:#10b981;--radius:14px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6;min-height:100vh;display:flex;justify-content:center}
  .container{max-width:640px;width:100%;padding:30px 20px}
  .header{text-align:center;margin-bottom:16px}
  .header h1{font-size:1.6rem;font-weight:700}
  .header p{color:var(--sub);font-size:0.9rem;margin-top:4px}
  .progress{display:flex;gap:4px;margin-bottom:24px}
  .progress-dot{flex:1;height:4px;background:var(--border);border-radius:4px;transition:background 0.3s}
  .progress-dot.done{background:var(--a1)}
  .progress-dot.done.s2{background:var(--a2)}
  .progress-dot.done.s3{background:var(--a3)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;animation:fadeIn 0.3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;margin-bottom:14px}
  .badge.s1{background:rgba(124,92,252,0.12);color:var(--a1)}
  .badge.s2{background:rgba(245,158,11,0.12);color:var(--a2)}
  .badge.s3{background:rgba(16,185,129,0.12);color:var(--a3)}
  .q-label{color:var(--sub);font-size:0.8rem;margin-bottom:12px}
  .q-title{font-size:1.1rem;font-weight:600;margin-bottom:20px;line-height:1.5}
  .privacy-note{color:var(--sub);font-size:0.78rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:20px;line-height:1.6}
  .privacy-note b{color:var(--a1)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .form-grid label{color:var(--sub);font-size:0.76rem;display:block;margin-bottom:4px}
  .form-grid input,.form-grid select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:0.9rem}
  .form-grid input:focus,.form-grid select:focus{outline:none;border-color:var(--a1)}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
  .opt{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all 0.2s;font-size:0.9rem;line-height:1.5}
  .opt:hover{border-color:var(--a1)}
  .opt.picked{border-color:var(--a1);background:rgba(124,92,252,0.06)}
  .opt.picked::after{content:" ✓";float:right;font-weight:700;color:var(--a1)}
  .fill-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:0.9rem;font-family:inherit;resize:vertical;min-height:90px;margin-bottom:24px}
  .fill-input:focus{outline:none;border-color:var(--a3)}
  .fill-hint{color:var(--sub);font-size:0.78rem;background:var(--bg);border-radius:8px;padding:10px 12px;margin-bottom:20px;line-height:1.6}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:12px}
  .btn{padding:11px 24px;border-radius:10px;border:none;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap}
  .btn-next{background:var(--a1);color:#fff}.btn-next:hover{opacity:0.9}
  .btn-next.s2{background:var(--a2)}.btn-next.s3{background:var(--a3)}
  .btn-back{background:transparent;color:var(--sub);border:1px solid var(--border)}
  .btn-back:hover{border-color:var(--a1);color:var(--text)}
  .btn-skip{background:transparent;color:var(--sub);font-size:0.8rem;cursor:pointer}
  .btn-skip:hover{color:var(--text)}
  .result{display:none;animation:fadeIn 0.5s ease}.result.visible{display:block}
  .result h2{text-align:center;margin-bottom:14px;font-size:1.2rem}
  .prompt-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;font-family:'SF Mono','Fira Code',monospace;font-size:0.82rem;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:500px;overflow-y:auto;margin-bottom:18px}
  .actions{display:flex;gap:12px}
  .btn-copy{background:var(--a3);color:#fff}.btn-copy:hover{opacity:0.9}
  .btn-reset{background:var(--card);color:var(--text);border:1px solid var(--border)}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--a1);color:#fff;padding:12px 28px;border-radius:10px;font-weight:600;font-size:0.9rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
  .toast.show{opacity:1}
  .footer{text-align:center;margin-top:32px;color:var(--sub);font-size:0.76rem}
  .footer a{color:var(--a1);text-decoration:none}
  @media(max-width:500px){.container{padding:18px 12px}.card{padding:20px 16px}.actions{flex-direction:column}.btn{width:100%;text-align:center}}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧭 Warmstart</h1>
    <p>选择场景 → 回答 12 题 → 任何 AI 第一次对话就认识你</p>
  </div>

    <div class="prompt-box" id="promptBox"></div>
    <div class="actions">
      <button class="btn btn-copy" onclick="copyPrompt()">📋 复制画像</button>
      <button class="btn btn-reset" onclick="resetAll()">🔄 重新开始</button>
    </div>
  </div>
  <div class="footer">
    <a href="https://github.com/diandian1001/warmstart" target="_blank">GitHub</a> · MIT · v0.5.0
  </div>
  <div class="toast" id="toast"></div>
</div>

// ============================================================
// 状态
// ============================================================
let step = 0;  // 0=birth, 1=scenario, 2-6=universal(5题), 7-10=scene(4题), 11=done
let sceneId = null;
let birth = {};
let universalAnswers = [];
let sceneAnswers = [];

// ============================================================
// 渲染
// ============================================================
function render() {
  // Progress: 1(birth) + 1(scenario) + 5(universal) + 4(scene) = 11步
  let dots = '';
  for(let i=0;i<11;i++){
    const cls = i<step ? 'done' : '';
    const s2 = (i>=1 && i<=6) ? ' s2' : '';
    const s3 = (i>=7) ? ' s3' : '';
    dots += `<div class="progress-dot${cls}${s2}${s3}"></div>`;
  }
  document.getElementById('progress').innerHTML = dots;
  if(step===0) renderBirth();
  else if(step===1) renderScenario();
  else if(step>=2 && step<=6) renderUniversal(step-2);
  else if(step>=7 && step<=10) renderSceneQ(step-7);
  else showResult();
}

function renderBirth(){
  const fv = (id) => birth[id] || '';
  const monthOpts = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const hourOpts = BIRTH_FIELDS.find(f=>f.id==='hour').options;
  const mbtiOpts = BIRTH_FIELDS.find(f=>f.id==='mbti').options;
  const genderOpts = BIRTH_FIELDS.find(f=>f.id==='gender').options;
  document.getElementById('card').innerHTML = `
    <div class="badge s1">出生信息（选填）</div>
    <div class="q-label">第 1 步 · 可直接跳过</div>
    <div class="privacy-note">
      📌 <b>填写原因：</b>出生信息用于生成命盘快照，帮助AI理解你当前的人生阶段。MBTI帮助AI更快适应你的思维和沟通偏好。<br>
      🔒 <b>隐私说明：</b>信息仅在本地处理，不会上传或存储到任何服务器。跳过后画像仍会通过场景维度问题生成。
    </div>
    <div class="form-grid">
      <div><label>出生年份</label><input type="number" placeholder="如 1995" value="${fv('year')}" oninput="birth.year=this.value"></div>
      <div><label>出生月份</label><select onchange="birth.month=this.value"><option value="">选择</option>${monthOpts.slice(1).map((m,i)=>`<option value="${i+1}"${birth.month==i+1?' selected':''}>${m}</option>`).join('')}</select></div>
      <div><label>出生日</label><input type="number" placeholder="1-31" min="1" max="31" value="${fv('day')}" oninput="birth.day=this.value"></div>
      <div><label>出生时辰</label><select onchange="birth.hour=this.value">${hourOpts.map((h,i)=>`<option value="${i}"${birth.hour==i?' selected':''}>${h}</option>`).join('')}</select></div>
      <div><label>性别</label><select onchange="birth.gender=this.value"><option value="">不填</option>${genderOpts.slice(1).map(g=>`<option value="${g}"${birth.gender===g?' selected':''}>${g}</option>`).join('')}</select></div>
      <div><label>MBTI（选填）</label><select onchange="birth.mbti=this.value"><option value="">不知道 / 跳过</option>${mbtiOpts.slice(1).map(m=>`<option value="${m}"${birth.mbti===m?' selected':''}>${m}</option>`).join('')}</select></div>
    </div>
    <div style="color:var(--sub);font-size:0.78rem;margin-bottom:20px;padding:8px 12px;background:var(--bg);border-radius:8px">💡 不知道MBTI可以跳过。如果做过测试，填入4个字母（如 INTJ），AI会据此调整沟通风格。</div>
    <div class="nav">
      <span></span>
      <span class="btn-skip" onclick="step=1;render()">跳过 →</span>
      <button class="btn btn-next" onclick="step=1;render()">下一步 →</button>
    </div>
  `;
}

function renderScenario(){
  document.getElementById('card').innerHTML = `
    <div class="badge s2">场景选择</div>
    <div class="q-label">第 2 步 · 选择最贴近的使用场景</div>
    <div class="q-title">你主要用 AI 做什么？<br><span style="font-size:0.85rem;color:var(--sub);font-weight:400">我们会根据你的选择只问相关的问题</span></div>
    <div class="options">${SCENARIOS.map((s,i)=>
      `<div class="opt${sceneId===s.id?' picked':''}" onclick="selectScenario('${s.id}')">${s.label}<br><span style="font-size:0.8rem;color:var(--sub)">${s.desc}</span></div>`
    ).join('')}</div>
    <div class="nav">
      <button class="btn btn-back" onclick="step=0;render()">← 出生信息</button>
      <span></span><span></span>
    </div>
  `;
}

function selectScenario(id){
  sceneId = id;
  universalAnswers = [];
  sceneAnswers = [];
  step = 2;
  render();
}

function renderUniversal(idx){
  const q = UNIVERSAL_Q[idx];
  document.getElementById('card').innerHTML = `
    <div class="badge s2">${q.badge}</div>
    <div class="q-label">第 ${idx+3} 步 · 通用偏好 ${idx+1}/5</div>
    <div class="q-title">${q.q}</div>
    <div class="options">${q.opts.map((o,i)=>
      `<div class="opt${universalAnswers[idx]===i?' picked':''}" onclick="universalAnswers[${idx}]=${i};step++;render()">${o.t}</div>`
    ).join('')}</div>
    <div class="nav">
      <button class="btn btn-back" onclick="step${idx===0?'=1':'--'};render()">← ${idx===0?'场景选择':'上一题'}</button>
      <span class="btn-skip" onclick="universalAnswers[${idx}]=-1;step++;render()">跳过</span>
      <span></span>
    </div>
  `;
}

function renderSceneQ(idx){
  const qs = SCENE_Q[sceneId];
  if(!qs||idx>=qs.length){showResult();return}
  const q = qs[idx];
  const isFill = q.type==='fill';
  document.getElementById('card').innerHTML = `
    <div class="badge s3">${q.badge}</div>
    <div class="q-label">第 ${idx+8} 步 · ${q.badge} ${idx+1}/${qs.length}${isFill?'':'（点击选项自动跳转）'}</div>
    <div class="q-title">${q.q}</div>
    ${isFill ? `
      <textarea class="fill-input" id="fillInput" placeholder="${q.placeholder||''}" oninput="sceneAnswers[${idx}]=this.value">${sceneAnswers[idx]||''}</textarea>
      ${q.examples?`<div class="fill-hint">💡 参考：${q.examples.map(e=>'"'+e+'"').join('、')}</div>`:''}
    ` : `
      <div class="options">${q.opts.map((o,i)=>
        `<div class="opt${sceneAnswers[idx]===i?' picked':''}" onclick="sceneAnswers[${idx}]=${i};step++;render()">${o.t}</div>`
      ).join('')}</div>
    `}
    <div class="nav">
      <button class="btn btn-back" onclick="step--;render()">← 上一题</button>
      ${!isFill && idx<qs.length-1 ? `<span class="btn-skip" onclick="sceneAnswers[${idx}]=-1;step++;render()">跳过</span>` : ''}
      ${isFill ? `<button class="btn btn-next" onclick="step++;render()">${idx===qs.length-1?'生成画像 ✨':'下一题 →'}</button>` : ''}
    </div>
  `;
  if(isFill) document.getElementById('fillInput')?.focus();
}

// ============================================================
// 生成画像
// ============================================================
function buildPrompt(){
  const qs = SCENE_Q[sceneId];
  const scene = SCENARIOS.find(s=>s.id===sceneId);
  const sceneLabel = scene?scene.label:'未选择';

  // 出生信息
  let birthLine = [];
  if(birth.year) birthLine.push(birth.year+'年');
  if(birth.month) birthLine.push(birth.month+'月');
  if(birth.day) birthLine.push(birth.day+'日');
  if(birth.hour && birth.hour!=='0') birthLine.push(BIRTH_FIELDS.find(f=>f.id==='hour').options[parseInt(birth.hour)]);
  if(birth.gender) birthLine.push('· '+birth.gender);
  const birthStr = birthLine.length?birthLine.join(''):'未填写';
  const hasBirth = birth.year && birth.month && birth.day;

  // 通用维度
  let universal = [];
  UNIVERSAL_Q.forEach((q,i)=>{
    const a = universalAnswers[i];
    if(a===undefined||a===null||a===-1) universal.push({badge:q.badge,val:'未填写'});
    else universal.push({badge:q.badge,val:q.opts[a].v});
  });

  // 场景维度
  let dims = [];
  qs.forEach((q,i)=>{
    const a = sceneAnswers[i];
    if(a===undefined||a===null||a===-1) dims.push({badge:q.badge,val:'未填写'});
    else if(typeof a==='string') dims.push({badge:q.badge,val:a});
    else dims.push({badge:q.badge,val:q.opts[a].v});
  });

  // MBTI映射
  let mbtiTraits = [];
  if(birth.mbti && MBTI_MAP[birth.mbti]){
    const m = MBTI_MAP[birth.mbti];
    mbtiTraits = [m.e, m.i||m.s, m.t||m.f, m.j||m.p];
  }

  // 组装
  let prompt = `# AI 画像 · ${sceneLabel}

## 用户背景
- 出生信息：${birthStr}${hasBirth?'':'（命盘快照功能开发中）'}
- 使用场景：${sceneLabel}

`;

  // 通用维度
  prompt += `## 通用偏好\n`;
  universal.forEach(u=>{
    prompt += `- ${u.badge}：${u.val}\n`;
  });
  prompt += '\n';

  // 场景维度
  dims.forEach(d=>{
    prompt += `## ${d.badge}\n${d.val}\n\n`;
  });

  // MBTI补充
  if(mbtiTraits.length){
    prompt += `## MBTI 补充参考
类型：${birth.mbti}
${mbtiTraits.join('\n')}

> ⚠️ 以上为性格背景参考，优先级低于场景维度的回答。
> 如果场景回答与 MBTI 推断有冲突，以场景回答为准。

`;
  }

  prompt += `---
> 本画像由 Warmstart v0.5.0 生成，复制到任何 AI 的 system prompt 中即可生效。
`;
  return prompt;
}

function showResult(){
  document.getElementById('card').innerHTML = '';
  document.getElementById('promptBox').textContent = buildPrompt();
  document.getElementById('result').classList.add('visible');
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
  document.querySelectorAll('.progress-dot').forEach(el=>el.classList.add('done'));
}

async function copyPrompt(){
  const t = document.getElementById('promptBox').textContent;
  try{await navigator.clipboard.writeText(t)}
  catch{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}
  showToast('✅ 已复制！粘贴到任何 AI 的 system prompt 中即可');
}

function resetAll(){
  step=0;sceneId=null;birth={};universalAnswers=[];sceneAnswers=[];
  document.getElementById('result').classList.remove('visible');
  render();
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
render();
</script>
