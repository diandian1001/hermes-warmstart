<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warmstart — 三重视角画像</title>
<style>
  :root { --bg:#0f1117; --card:#1a1d27; --border:#2a2d3a; --text:#e1e4eb; --sub:#8b8fa3;
    --a1:#7c5cfc; --a2:#f59e0b; --a3:#10b981; --radius:14px; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; line-height:1.6; min-height:100vh; display:flex; justify-content:center; }
  .container { max-width:640px; width:100%; padding:30px 20px; }
  .header { text-align:center; margin-bottom:16px; }
  .header h1 { font-size:1.6rem; font-weight:700; }
  .header p { color:var(--sub); font-size:0.9rem; margin-top:4px; }
  .section-bar { display:flex; gap:6px; margin-bottom:24px; }
  .section-step { flex:1; height:4px; background:var(--border); border-radius:4px; transition:background 0.3s; }
  .section-step.done { background:var(--a1); }
  .section-step.done.s2 { background:var(--a2); }
  .section-step.done.s3 { background:var(--a3); }
  .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:36px 28px; animation:fadeIn 0.35s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .badge { display:inline-block; padding:3px 12px; border-radius:20px; font-size:0.75rem; font-weight:600; margin-bottom:16px; }
  .badge.s1 { background:rgba(124,92,252,0.12); color:var(--a1); }
  .badge.s2 { background:rgba(245,158,11,0.12); color:var(--a2); }
  .badge.s3 { background:rgba(16,185,129,0.12); color:var(--a3); }
  .q-counter { color:var(--sub); font-size:0.8rem; margin-bottom:20px; }
  .q-title { font-size:1.15rem; font-weight:600; margin-bottom:24px; line-height:1.5; }
  .options { display:flex; flex-direction:column; gap:10px; margin-bottom:28px; }
  .opt { background:var(--bg); border:1.5px solid var(--border); border-radius:10px; padding:15px 18px; cursor:pointer; transition:all 0.2s; font-size:0.93rem; line-height:1.5; }
  .opt:hover { border-color:var(--a1); }
  .opt.picked { border-color:var(--a1); background:rgba(124,92,252,0.06); }
  .opt.picked.s2 { border-color:var(--a2); background:rgba(245,158,11,0.06); }
  .opt.picked.s3 { border-color:var(--a3); background:rgba(16,185,129,0.06); }
  .opt.picked::after { content:" ✓"; float:right; font-weight:700; color:var(--a1); }
  .opt.picked.s2::after { color:var(--a2); }
  .opt.picked.s3::after { color:var(--a3); }
  .fill-input { width:100%; background:var(--bg); border:1.5px solid var(--border); border-radius:10px; padding:16px; color:var(--text); font-size:0.93rem; font-family:inherit; resize:vertical; min-height:100px; transition:border-color 0.2s; margin-bottom:28px; }
  .fill-input:focus { outline:none; border-color:var(--a3); }
  .nav { display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .btn { padding:11px 28px; border-radius:10px; border:none; font-size:0.9rem; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .btn-next { background:var(--a1); color:#fff; }
  .btn-next:hover { opacity:0.9; }
  .btn-next.s2 { background:var(--a2); }
  .btn-next.s3 { background:var(--a3); }
  .btn-back { background:transparent; color:var(--sub); border:1px solid var(--border); }
  .btn-back:hover { border-color:var(--a1); color:var(--text); }
  .btn-skip { background:transparent; color:var(--sub); font-size:0.82rem; cursor:pointer; }
  .btn-skip:hover { color:var(--text); }
  .result { display:none; animation:fadeIn 0.5s ease; }
  .result.visible { display:block; }
  .result h2 { text-align:center; margin-bottom:16px; font-size:1.25rem; }
  .prompt-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); padding:24px; font-family:'SF Mono','Fira Code',monospace; font-size:0.83rem; line-height:1.8; white-space:pre-wrap; word-break:break-word; max-height:500px; overflow-y:auto; margin-bottom:20px; }
  .actions { display:flex; gap:12px; }
  .btn-copy { background:var(--a3); color:#fff; }
  .btn-reset { background:var(--card); color:var(--text); border:1px solid var(--border); }
  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:var(--a1); color:#fff; padding:12px 28px; border-radius:10px; font-weight:600; font-size:0.9rem; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:100; }
  .toast.show { opacity:1; }
  .footer { text-align:center; margin-top:36px; color:var(--sub); font-size:0.78rem; }
  .footer a { color:var(--a1); text-decoration:none; }
  @media (max-width:500px) { .container { padding:20px 12px; } .card { padding:24px 18px; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🧭 Warmstart</h1>
    <p>三重画像 · 一次构建 · 任何 AI 第一次对话就认识你</p>
  </div>
  <div class="section-bar" id="sectionBar">
    <div class="section-step"></div>
    <div class="section-step"></div>
    <div class="section-step"></div>
  </div>
  <div class="card" id="card"></div>
  <div class="result" id="result">
    <h2>✅ 你的专属 AI 画像</h2>
    <p style="text-align:center;color:var(--sub);margin-bottom:16px;">三重视角已融合，复制到任何 AI 的 system prompt 中</p>
    <div class="prompt-box" id="promptBox"></div>
    <div class="actions">
      <button class="btn btn-copy" onclick="copyPrompt()">📋 复制画像</button>
      <button class="btn btn-reset" onclick="resetAll()">🔄 重新开始</button>
    </div>
  </div>
  <div class="footer">
    <a href="https://github.com/diandian1001/warmstart" target="_blank">GitHub</a> · MIT · v0.3.3
  </div>
  <div class="toast" id="toast"></div>
</div>

<script>
const LIFE_Q = [
  {badge:"命宫", q:"你的核心性格更接近哪种？", opts:[
    {t:"领导型：有主见、爱主导、目标感强", v:"领导型（紫微/天府类）"},
    {t:"柔和型：善配合、亲和力好、不急躁、人际敏感", v:"柔和型（天同/太阴类）"},
    {t:"灵活型：适应性强、随机应变、不喜欢被限制", v:"灵活型（天机/贪狼类）"},
  ]},
  {badge:"身宫", q:"当前人生阶段你最关注什么？", opts:[
    {t:"事业突破：能力提升、晋升、创业、经济独立", v:"事业突破期"},
    {t:"家庭生活：亲密关系、子女教育、父母照护", v:"家庭经营期"},
    {t:"个人成长：学习新知、旅行探索、内心沉淀", v:"个人成长期"},
    {t:"财务安全：储蓄投资、降低风险、稳定根基", v:"财务积累期"},
  ]},
  {badge:"迁移宫", q:"在对外场合你的表现风格？", opts:[
    {t:"沉稳专业：严谨细致、可信赖、不随意表态", v:"沉稳专业型"},
    {t:"热情外向：有感染力、善于破冰、乐于分享", v:"热情外向型"},
    {t:"低调务实：先做事后说话、不张扬、真实力", v:"低调务实型"},
  ]},
];

const PERSONALITY_Q = [
  {badge:"做事风格", q:"面对一个新任务，你通常怎么做？", opts:[
    {t:"先列计划、分步骤，确保每个环节都有数", s:1.0},
    {t:"大概有个方向就开始，边做边调整", s:0.3},
    {t:"看情况，重要的事会先计划", s:0.6},
  ]},
  {badge:"沟通偏好", q:"和别人沟通时，你更倾向于？", opts:[
    {t:"直来直去，说重点就行", s:0.2},
    {t:"先寒暄几句，关系融洽了再谈正事", s:1.0},
    {t:"看对象，熟人就直说，不熟就多铺垫", s:0.6},
  ]},
  {badge:"思维方式", q:"遇到一个难题，你倾向于？", opts:[
    {t:"尝试全新的方法，哪怕冒险", s:1.0},
    {t:"用之前验证过的成熟方法", s:0.2},
    {t:"看问题的性质，新问题用新方法", s:0.6},
  ]},
  {badge:"情绪反应", q:"当事情进展不顺时，你通常？", opts:[
    {t:"容易焦虑，需要有人肯定方向是对的", s:1.0},
    {t:"不太受影响，直接分析问题在哪", s:0.2},
    {t:"会短暂焦虑但能很快调整", s:0.6},
  ]},
  {badge:"决策方式", q:"做重要决定时，你更依赖？", opts:[
    {t:"自己的判断和分析", s:0.2},
    {t:"多听几个人的意见再定", s:1.0},
    {t:"自己判断为主，但会参考信任的人的意见", s:0.6},
  ]},
];

const AGENT_Q = [
  {badge:"用途", q:"你主要用这个 AI agent 做什么？", opts:[
    {t:"工作助手（写文档、做分析、项目管理）", v:"工作助手"},
    {t:"个人教练（学习规划、习惯养成、情绪支持）", v:"个人教练"},
    {t:"日常对话（闲聊、陪伴、解答生活疑惑）", v:"日常陪伴"},
    {t:"专业技能（编程、设计、研究、学术）", v:"专业工具"},
  ]},
  {badge:"语气", q:"你希望 agent 用什么语气回复你？", opts:[
    {t:"正式专业：逻辑严密、用词准确", v:"正式专业"},
    {t:"简洁高效：直击重点、不废话", v:"简洁高效"},
    {t:"轻松随意：像朋友聊天、有温度", v:"轻松随意"},
  ]},
  {badge:"长度", q:"你偏好什么样的回复长度？", opts:[
    {t:"简短精炼（一两句话说清）", v:"简短"},
    {t:"适中（一段话，有要点有分析）", v:"适中"},
    {t:"详细全面（多角度分析、分点展开）", v:"详细"},
  ]},
  {badge:"特别要求", q:"还有什么想对 agent 说的？", type:"fill", placeholder:"例如：避免英文缩写、优先中国本土案例、涉及心理话题时不下诊断……"},
];

// 修复1+2：标签修正
const LABELS = {
  conscientiousness:{high:"做事有计划，习惯先规划再执行。",low:"做事灵活，边做边调整，不喜欢被固定流程束缚。",mid:"做事有一定计划性，但也接受灵活调整。"},
  extraversion:{high:"沟通中注重关系建立，喜欢先建立融洽感再谈正事。",low:"沟通风格直接，喜欢简洁、直奔主题。",mid:"沟通风格会根据对象调整，熟人直接，陌生人多铺垫。"},
  openness:{high:"对新事物和新方法接受度高，愿意尝试有风险的方案。",low:"偏好成熟、经过验证的方法，对风险保持谨慎。",mid:"对创新持开放态度，但会根据具体情况判断是否采用。"},
  neuroticism:{high:"对挫折比较敏感，需要得到肯定和方向确认。",low:"情绪稳定，面对挫折时更关注如何解决问题本身。",mid:"情绪状态可能有波动，不要假设用户已经ready解决问题。"},
  agreeableness:{high:"习惯综合多方意见后再做决定，重视他人的看法。",low:"决策时更依赖自己的判断，较少参考他人意见。",mid:"有自己的判断，也会参考信任之人的意见。"},
};

// 修复3：区分三种"简洁"
const INSTRUCTIONS = {
  conscientiousness:{high:"输出时先给框架和步骤，再给具体内容",mid:"输出时先给结论，再给框架，最后给内容",low:"输出时先给结论，再给推导过程"},
  extraversion:{high:"适当加入回应性语言，在对话中建立连接感",mid:"根据话题节奏自然切换简洁和关系型沟通",low:"正式简洁——用最少的话传递最完整的信息，适合向上汇报场景"},
  openness:{high:"多提供新思路和替代方案，不局限于最常规的答案",mid:"给出成熟方案但标注可选的新方向",low:"优先给出已验证的成熟方案，减少不确定的选项"},
  neuroticism:{high:"反馈时先肯定再给建议，避免直接否定用户的判断",mid:"必要时先共情再分析，不需要过多情绪铺垫",low:"直接给出分析和建议，不需要过多情绪缓冲"},
  agreeableness:{high:"适时征求用户意见，保持双向沟通节奏",mid:"给出判断后留一个征求意见的窗口",low:"尊重用户的独立判断，不要频繁追问'你觉得呢'"},
};

const SECTIONS = [
  {name:"人生轨迹", q:LIFE_Q, color:"s1", nid:"life_", key:"life"},
  {name:"性格画像", q:PERSONALITY_Q, color:"s2", nid:"pers_", key:"pers"},
  {name:"Agent 定制", q:AGENT_Q, color:"s3", nid:"ag_", key:"ag"},
];

let sec = 0; let qi = 0;
let answers = [[], [], []];
let agCustom = "";

function render() {
  if (sec >= 3) { showResult(); return; }
  const s = SECTIONS[sec];
  const q = s.q[qi];
  const isFill = q.type === "fill";
  const cls = s.color;
  document.querySelectorAll(".section-step").forEach((el, i) => {
    el.className = "section-step";
    if (i < sec) el.classList.add("done", SECTIONS[i].color);
    if (i === sec && qi === s.q.length - 1) el.classList.add("done", s.color);
  });
  const total = s.q.length;
  const counter = isFill ? `第 ${qi+1}/${total} 题` : `第 ${qi+1}/${total} 题（点击选项自动跳转下一题）`;
  const optsHTML = isFill ? "" : q.opts.map((o, i) => {
    const picked = answers[sec][qi] !== undefined && answers[sec][qi] !== null &&
      (s.key==="pers" ? answers[sec][qi].s === o.s : answers[sec][qi].v === o.v);
    return `<div class="opt${picked?' picked '+cls:''}" onclick="pick(${i})">${o.t}</div>`;
  }).join("");
  const fillHTML = isFill ? `<textarea class="fill-input" id="fillInput" placeholder="${q.placeholder||''}" oninput="agCustom=this.value">${agCustom||''}</textarea>` : "";
  const backBtn = (qi > 0)
    ? `<button class="btn btn-back" onclick="prev()">← 上一题</button>`
    : (sec > 0 ? `<button class="btn btn-back" onclick="prevSection()">← ${SECTIONS[sec-1].name}</button>` : `<span></span>`);
  const nextBtn = isFill
    ? `<button class="btn btn-next ${cls}" onclick="next()">${qi===total-1?'生成画像 ✨':'下一题 →'}</button>`
    : "";
  const skipBtn = !isFill && qi < total - 1
    ? `<span class="btn-skip" onclick="skip()">跳过此题</span>`
    : "";
  document.getElementById("card").innerHTML = `
    <div class="badge ${cls}">${s.name} · ${q.badge}</div>
    <div class="q-counter">${counter}</div>
    <div class="q-title">${q.q}</div>
    ${optsHTML}
    ${fillHTML}
    <div class="nav">
      ${backBtn}
      ${skipBtn}
      ${nextBtn}
    </div>
  `;
  if (isFill) document.getElementById("fillInput")?.focus();
  document.getElementById("result").classList.remove("visible");
}

function pick(idx) {
  const s = SECTIONS[sec];
  const q = s.q[qi];
  if (s.key === "pers") answers[sec][qi] = {s: q.opts[idx].s};
  else answers[sec][qi] = {v: q.opts[idx].v};
  next();
}

function next() {
  const s = SECTIONS[sec];
  if (qi < s.q.length - 1) { qi++; }
  else { qi = 0; sec++; }
  render();
}

function prev() {
  if (qi > 0) qi--;
  else { sec--; qi = SECTIONS[sec].q.length - 1; }
  render();
}

function prevSection() {
  sec--;
  qi = SECTIONS[sec].q.length - 1;
  render();
}

function skip() { next(); }

// 修复4+5+6：出生信息标注 + 画像D完整结构
function buildFinalPrompt() {
  const L = LIFE_Q, P = PERSONALITY_Q, A = AGENT_Q;
  const la = answers[0], pa = answers[1], aa = answers[2];
  const gv = (arr, i) => (arr[i] && arr[i].v) || "未填写";

  let ming = gv(la, 0), shen = gv(la, 1), migr = gv(la, 2);

  let scores = {};
  P.forEach((_, i) => { scores[_.badge] = (pa[i] && pa[i].s !== undefined) ? pa[i].s : 0.5; });

  let desc = [];
  let dims = ["conscientiousness","extraversion","openness","neuroticism","agreeableness"];
  dims.forEach((d,i) => {
    let v = scores[P[i].badge];
    if (v>=0.7) desc.push(LABELS[d].high); else if (v<=0.3) desc.push(LABELS[d].low); else desc.push(LABELS[d].mid);
  });
  let inst = [];
  dims.forEach((d,i) => {
    let v = scores[P[i].badge];
    if (v>=0.7) inst.push(`- ${INSTRUCTIONS[d].high}`); else if (v<=0.3) inst.push(`- ${INSTRUCTIONS[d].low}`); else inst.push(`- ${INSTRUCTIONS[d].mid}`);
  });

  let use = gv(aa, 0), tone = gv(aa, 1), len = gv(aa, 2);
  let lenInst = len==="简短" ? "回复尽量简短精炼，一两句话说清。" : (len==="详细" ? "回复可以详尽全面，多角度分析，分点展开。" : "回复长度适中，一段话讲清楚，有要点有分析。");
  let toneInst = tone==="正式专业" ? "语气正式专业，逻辑严密，减少口语化表达。" : (tone==="简洁高效" ? "语气简洁高效，直击重点。" : "语气轻松随意，像朋友一样交流，适当加入情感表达。");
  let useInst = {"工作助手":"你是一个工作助手，专注于文档撰写、数据分析、项目管理等任务。","个人教练":"你是一个个人教练，帮助用户进行学习规划、习惯养成和情绪支持。","日常陪伴":"你是一个日常对话伙伴，提供陪伴、闲聊和生活疑惑解答。","专业工具":"你是一个专业工具型 agent，专注于编程、设计、研究等技能领域的深度协助。"}[use] || "你是一个 AI 助手。";
  let customBlock = agCustom ? `\n### 用户特别要求\n${agCustom}\n` : "";

  // 修复4：出生信息标注（暂不收集，预留接口）
  let birthNote = "- 出生信息：未收集（命盘时间轴功能开发中，暂不影响画像质量）";

  return `# ${useInst}

## 用户背景
${birthNote}
- 性格基调：${ming}
- 当前焦点：${shen}
- 对外风格：${migr}

## 沟通偏好
${desc.join("")}

### 适配指令
${inst.join("\n")}

## Agent 行为准则
- ${toneInst}
- ${lenInst}${customBlock}
---
> 本画像由 Warmstart v0.3.3 生成，可复制到任何 AI 的 system prompt 中直接使用。
`;
}

function showResult() {
  document.getElementById("card").innerHTML = "";
  document.getElementById("promptBox").textContent = buildFinalPrompt();
  document.getElementById("result").classList.add("visible");
  document.getElementById("result").scrollIntoView({behavior:"smooth"});
  document.querySelectorAll(".section-step").forEach(el => { el.classList.add("done"); });
}

async function copyPrompt() {
  const t = document.getElementById("promptBox").textContent;
  try { await navigator.clipboard.writeText(t); }
  catch { const ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta); }
  showToast("✅ 已复制！粘贴到任何 AI 的 system prompt 中即可");
}

function resetAll() {
  sec=0; qi=0; answers=[[],[],[]]; agCustom="";
  document.getElementById("result").classList.remove("visible");
  document.querySelectorAll(".section-step").forEach(el => { el.className="section-step"; });
  render();
}
function showToast(msg) { const t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2500); }
render();
</script>
</body>
</html>
