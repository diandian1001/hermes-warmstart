<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warmstart — AI Collaboration Profile Generator</title>
<style>
  :root{--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e1e4eb;--sub:#8b8fa3;--a1:#7c5cfc;--a2:#f59e0b;--a3:#10b981;--radius:14px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6;min-height:100vh;display:flex;justify-content:center}
  .container{max-width:640px;width:100%;padding:30px 20px}
  .header{text-align:center;margin-bottom:16px}
  .header h1{font-size:1.6rem;font-weight:700}
  .header p{color:var(--sub);font-size:0.9rem;margin-top:4px}
  .progress{display:flex;gap:4px;margin-bottom:24px}
  .progress-dot{flex:1;height:4px;background:var(--border);border-radius:4px;transition:background 0.3s}
  .progress-dot.done{background:var(--a1)}
  .progress-dot.done.s2{background:var(--a2)}
  .progress-dot.done.s3{background:var(--a3)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px 24px;animation:fadeIn 0.3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:0.75rem;font-weight:600;margin-bottom:14px}
  .badge.s1{background:rgba(124,92,252,0.12);color:var(--a1)}
  .badge.s2{background:rgba(245,158,11,0.12);color:var(--a2)}
  .badge.s3{background:rgba(16,185,129,0.12);color:var(--a3)}
  .badge.s0{background:rgba(124,92,252,0.12);color:var(--a1)}
  .q-label{color:var(--sub);font-size:0.8rem;margin-bottom:12px}
  .q-title{font-size:1.1rem;font-weight:600;margin-bottom:20px;line-height:1.5}
  .privacy-note{color:var(--sub);font-size:0.78rem;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:20px;line-height:1.6}
  .privacy-note b{color:var(--a1)}
  .warning-note{color:var(--a2);font-size:0.78rem;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.3);border-radius:10px;padding:12px 14px;margin-bottom:20px;line-height:1.6}
  .warning-note strong{color:var(--a2)}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .form-grid label{color:var(--sub);font-size:0.76rem;display:block;margin-bottom:4px}
  .form-grid input,.form-grid select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:0.9rem}
  .form-grid input:focus,.form-grid select:focus{outline:none;border-color:var(--a1)}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
  .opt{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all 0.2s;font-size:0.9rem;line-height:1.5}
  .opt:hover{border-color:var(--a1)}
  .opt.picked{border-color:var(--a1);background:rgba(124,92,252,0.06)}
  .opt.picked::after{content:" ✓";float:right;font-weight:700;color:var(--a1)}
  .opt.recommended{border-color:var(--a3);background:rgba(16,185,129,0.04)}
  .opt.recommended .rec-tag{display:inline-block;background:var(--a3);color:#fff;font-size:0.7rem;padding:2px 8px;border-radius:10px;margin-left:6px;font-weight:600}
  .mode-card{border:2px solid var(--border);border-radius:var(--radius);padding:22px 20px;cursor:pointer;transition:all 0.2s;margin-bottom:12px}
  .mode-card:hover{border-color:var(--a1)}
  .mode-card.picked{border-color:var(--a1);background:rgba(124,92,252,0.04)}
  .mode-card .mode-title{font-size:1rem;font-weight:600;margin-bottom:4px}
  .mode-card .mode-desc{color:var(--sub);font-size:0.82rem;line-height:1.5}
  .fill-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px;color:var(--text);font-size:0.9rem;font-family:inherit;resize:vertical;min-height:90px;margin-bottom:24px}
  .fill-input:focus{outline:none;border-color:var(--a3)}
  .fill-hint{color:var(--sub);font-size:0.78rem;background:var(--bg);border-radius:8px;padding:10px 12px;margin-bottom:20px;line-height:1.6}
  .nav{display:flex;justify-content:space-between;align-items:center;gap:12px}
  .btn{padding:11px 24px;border-radius:10px;border:none;font-size:0.88rem;font-weight:600;cursor:pointer;transition:all 0.2s;white-space:nowrap}
  .btn-next{background:var(--a1);color:#fff}.btn-next:hover{opacity:0.9}
  .btn-next.s2{background:var(--a2)}.btn-next.s3{background:var(--a3)}
  .btn-back{background:transparent;color:var(--sub);border:1px solid var(--border)}
  .btn-back:hover{border-color:var(--a1);color:var(--text)}
  .btn-skip{background:transparent;color:var(--sub);font-size:0.8rem;cursor:pointer;padding:8px;border:none}
  .btn-skip:hover{color:var(--text)}
  .result{display:none;animation:fadeIn 0.5s ease}.result.visible{display:block}
  .result h2{text-align:center;margin-bottom:14px;font-size:1.2rem}
  .prompt-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;font-family:'SF Mono','Fira Code',monospace;font-size:0.82rem;line-height:1.8;white-space:pre-wrap;word-break:break-word;max-height:500px;overflow-y:auto;margin-bottom:18px}
  .actions{display:flex;gap:12px;flex-wrap:wrap}
  .btn-copy{background:var(--a3);color:#fff}.btn-copy:hover{opacity:0.9}
  .btn-reset{background:var(--card);color:var(--text);border:1px solid var(--border)}
  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:var(--a1);color:#fff;padding:12px 28px;border-radius:10px;font-weight:600;font-size:0.9rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
  .toast.show{opacity:1}
  .footer{text-align:center;margin-top:32px;color:var(--sub);font-size:0.76rem}
  .footer a{color:var(--a1);text-decoration:none}
  @media(max-width:500px){.container{padding:18px 12px}.card{padding:20px 16px}.actions{flex-direction:column}.btn{width:100%;text-align:center}.form-grid{grid-template-columns:1fr}}
</style>
</head>

  </div>
  <div class="footer">
    <a href="https://github.com/diandian1001/ai-warmstart" target="_blank">GitHub</a> · <a href="PRIVACY.md" target="_blank">Privacy</a> · MIT · v0.7.0
  </div>
  <div class="toast" id="toast"></div>
</div>
<script src="ziwei.js"></script>

    {badge:"Creative Bottleneck",q:"Most time-consuming creative phase?",opts:[

      {t:"Execution: vision clear but output falls short",v:"Execution"},
      {t:"Iteration: first version is okay but don't know how to improve",v:"Iteration"},
      {t:"Topic selection: don't know what to create daily",v:"Topic selection"},
    ]},
    {badge:"AI Help",q:"How should AI help with creative work?",opts:[
      {t:"Generate first draft/version, I'll refine",v:"First draft"},
      {t:"Brainstorm ideas and angles, I'll execute",v:"Brainstorm"},
      {t:"Optimize existing work, improve quality",v:"Optimize"},
      {t:"Be my creative partner, brainstorm together",v:"Creative partner"},
    ]},
  ],
  daily: [
    {badge:"Chat Frequency",q:"How often do you chat with AI?",opts:[
      {t:"Daily, like a routine",v:"Daily habit"},
      {t:"As needed, when problems arise",v:"On-demand"},
      {t:"Occasionally, exploring or passing time",v:"Occasional"},
      {t:"New user, still figuring it out",v:"New user"},
    ]},
    {badge:"Life State",q:"Your current life state?",opts:[
      {t:"Full and busy: work and life are both packed",v:"Busy and full"},
      {t:"Steady routine: no major ups and downs",v:"Steady"},
      {t:"A bit lost: unsure what's next",v:"Navigating"},
      {t:"High pressure: going through challenges",v:"High pressure"},
    ]},
    {badge:"Conversation Tone",q:"How should AI talk to you?",opts:[
      {t:"Like a friend: casual, back-and-forth",v:"Friend"},
      {t:"Like a coach: direction and action steps",v:"Coach"},
      {t:"Like a confidant: just listen, no advice needed",v:"Confidant"},
      {t:"Like an encyclopedia: precise answers, no fluff",v:"Encyclopedia"},
    ]},
    {badge:"Most Needed Help",q:"What help do you most want from AI?",opts:[
      {t:"Answer daily life questions (what to eat, how to choose)",v:"Life Q&A"},
      {t:"Help clarify my thoughts and emotions",v:"Clarity"},
      {t:"Give encouragement and positive feedback",v:"Emotional support"},
      {t:"Keep me company, ease loneliness",v:"Companionship"},
    ]},
  ],
  custom: [
    {badge:"Use Case",q:"What do you primarily use AI for?",type:"fill",placeholder:"Describe your main AI interaction scenario in one sentence",examples:["User research and competitive analysis","Paper writing and literature review","Data analysis and report writing","Coding and debugging","Social media content planning","Product requirements analysis","Household budget and expense management","Chatting to clarify my thoughts"]},
    {badge:"Communication Style",q:"What communication style do you prefer?",opts:[
      {t:"Formal & professional: rigorous logic, precise wording",v:"Formal professional"},
      {t:"Concise & efficient: straight to the point, no fluff",v:"Concise efficient"},
      {t:"Casual & warm: like chatting with a friend",v:"Casual warm"},
      {t:"Patient & guiding: ask and confirm, like a teacher",v:"Patient guide"},
    ]},
    {badge:"Special Requests",q:"Any special requirements?",type:"fill",placeholder:"Write any rules or preferences for AI. Optional.",examples:["Avoid English abbreviations, use full Chinese terms","Don't give diagnoses on psychology topics, only suggestions","Prefer China-local cases and data","Include source references after replies","Don't proactively ask follow-ups, just answer what I ask","Remind me to consult professionals on health topics","Use emojis to make replies more engaging","Don't use markdown formatting"]},
  ],
};

// ============================================================
// State
// ============================================================
var step = 0;
var sceneId = null;
var birth = {};
var universalAnswers = [];
var sceneAnswers = [];

// ============================================================
// Render
// ============================================================
function totalSteps() {
  // Professional mode: scene(1) + universal(5) + sceneQ(4) = 10 internal steps
  // Experimental mode: birth(1) + scene(1) + universal(5) + sceneQ(4) = 11 internal steps
  return mode === 'exp' ? 11 : 10;
}

function render() {
  var total = totalSteps();
  var dots = '';
  for (var i = 0; i < total; i++) {
    var cls = i < step ? 'done' : '';
    var s2 = '';
    var s3 = '';
    if (mode === 'exp') {
      if (i >= 2 && i <= 6) s2 = ' s2';
      else if (i >= 7) s3 = ' s3';
    } else {
      if (i >= 1 && i <= 5) s2 = ' s2';
      else if (i >= 6) s3 = ' s3';
    }
    dots += '<div class="progress-dot' + cls + s2 + s3 + '"></div>';
  }
  document.getElementById('progress').innerHTML = dots;

  if (step === 0) renderMode();
  else if (mode === 'exp' && step === 1) renderBirth();
  else if ((mode === 'exp' && step === 2) || (mode === 'pro' && step === 1)) renderScenario();
  else {
    var offset = mode === 'exp' ? 2 : 1;
    if (step >= (offset + 1) && step <= (offset + 5)) renderUniversal(step - offset - 1);
    else if (step >= (offset + 6) && step <= (offset + 9)) renderSceneQ(step - offset - 6);
    else showResult();
  }
}

function renderMode(){
  document.getElementById('card').innerHTML = 
    '<div class="badge s0">Choose Mode</div>' +
    '<div class="q-label">Step 1 · Select your experience</div>' +
    '<div class="q-title">How would you like to generate your AI profile?</div>' +
    '<div class="mode-card recommended" onclick="selectMode(\'pro\')" style="margin-bottom:14px">' +
      '<div class="mode-title">💼 Professional Mode <span class="rec-tag">Recommended</span></div>' +
      '<div class="mode-desc">Focus on your observable AI collaboration preferences: communication style, feedback needs, task management, and decision-making approach. <strong>No personal data required.</strong> Generates a clean, professional profile you can use in any work context.</div>' +
    '</div>' +
    '<div class="mode-card" onclick="selectMode(\'exp\')">' +
      '<div class="mode-title">🎭 Experimental Mode</div>' +
      '<div class="mode-desc">Includes everything in Professional Mode, plus optional MBTI type and Zi Wei Dou Shu (Chinese astrology) for entertainment and self-exploration. <strong>⚠️ Astrology content is for entertainment only — it does not constitute personality measurement, psychological assessment, or decision-making guidance.</strong></div>' +
    '</div>' +
    '<p style="color:var(--sub);font-size:0.78rem;text-align:center;margin-top:12px">You can switch modes anytime by clicking "Start Over".</p>';
}

function selectMode(m){
  mode = m;
  step = 1;
  birth = {};
  universalAnswers = [];
  sceneAnswers = [];
  sceneId = null;
  render();
}

function renderBirth(){
  var fv = function(id) { return birth[id] || ''; };
  var monthOpts = ['','1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  var hourOpts = BIRTH_FIELDS.find(function(f){return f.id==='hour'}).options;
  var mbtiOpts = BIRTH_FIELDS.find(function(f){return f.id==='mbti'}).options;
  var genderOpts = BIRTH_FIELDS.find(function(f){return f.id==='gender'}).options;
  document.getElementById('card').innerHTML = 
    '<div class="badge s1">Experimental · Birth Info (Optional)</div>' +
    '<div class="q-label">Step 2 · You can skip this entirely</div>' +
    '<div class="warning-note">' +
      '🎭 <strong>Entertainment Only:</strong> The astrology features on this page (Zi Wei Dou Shu star charts, MBTI type mapping) are provided <strong>for entertainment and self-exploration purposes only</strong>. They do not constitute personality measurement, psychological assessment, career guidance, or any form of decision-making basis. No scientific validity is claimed for astrological interpretations of personality or life stage.' +
    '</div>' +
    '<div class="privacy-note">' +
      '🔒 <strong>Privacy:</strong> All data entered on this page is processed entirely in your browser. <strong>Nothing is uploaded to any server.</strong> No data is stored after you close this page. See <a href="PRIVACY.md" target="_blank" style="color:var(--a1)">PRIVACY.md</a> for details.' +
    '</div>' +
    '<div class="form-grid">' +
      '<div><label>Birth Year</label><input type="number" placeholder="e.g. 1995" value="' + fv('year') + '" oninput="birth.year=this.value"></div>' +
      '<div><label>Birth Month</label><select onchange="birth.month=this.value"><option value="">Select</option>' + monthOpts.slice(1).map(function(m,i){return '<option value="'+(i+1)+'"'+(birth.month==i+1?' selected':'')+'>'+m+'</option>';}).join('') + '</select></div>' +
      '<div><label>Birth Day</label><input type="number" placeholder="1-31" min="1" max="31" value="' + fv('day') + '" oninput="birth.day=this.value"></div>' +
      '<div><label>Birth Hour</label><select onchange="birth.hour=this.value">' + hourOpts.map(function(h,i){return '<option value="'+i+'"'+(birth.hour==i?' selected':'')+'>'+h+'</option>';}).join('') + '</select></div>' +
      '<div><label>Gender</label><select onchange="birth.gender=this.value"><option value="">Skip</option>' + genderOpts.slice(1).map(function(g){return '<option value="'+g+'"'+(birth.gender===g?' selected':'')+'>'+g+'</option>';}).join('') + '</select></div>' +
      '<div><label>MBTI (Optional)</label><select onchange="birth.mbti=this.value"><option value="">Don\'t know / Skip</option>' + mbtiOpts.slice(1).map(function(m){return '<option value="'+m+'"'+(birth.mbti===m?' selected':'')+'>'+m+'</option>';}).join('') + '</select></div>' +
    '</div>' +
    '<div style="color:var(--sub);font-size:0.78rem;margin-bottom:20px;padding:8px 12px;background:var(--bg);border-radius:8px">💡 You can skip MBTI if you haven\'t taken the test. All fields on this page are optional.</div>' +
    '<div class="nav">' +
      '<button class="btn btn-back" onclick="step=0;render()">← Back</button>' +
      '<span class="btn-skip" onclick="step=2;render()">Skip All →</span>' +
      '<button class="btn btn-next" onclick="step=2;render()">Next →</button>' +
    '</div>';
}

function renderScenario(){
  var stepNum = mode === 'exp' ? 3 : 2;
  document.getElementById('card').innerHTML = 
    '<div class="badge s2">Scenario</div>' +
    '<div class="q-label">Step ' + stepNum + ' · Choose your primary use case</div>' +
    '<div class="q-title">What do you primarily use AI for?<br><span style="font-size:0.85rem;color:var(--sub);font-weight:400">We\'ll only ask questions relevant to your choice</span></div>' +
    '<div class="options">' + SCENARIOS.map(function(s){
      return '<div class="opt'+(sceneId===s.id?' picked':'')+'" onclick="selectScenario(\''+s.id+'\')">'+s.label+'<br><span style="font-size:0.8rem;color:var(--sub)">'+s.desc+'</span></div>';
    }).join('') + '</div>' +
    '<div class="nav">' +
      (mode === 'exp' ? '<button class="btn btn-back" onclick="step=1;render()">← Birth Info</button>' : '<button class="btn btn-back" onclick="step=0;render()">← Mode</button>') +
      '<span></span><span></span>' +
    '</div>';
}

function selectScenario(id){
  sceneId = id;
  universalAnswers = [];
  sceneAnswers = [];
  step = (mode === 'exp' ? 3 : 2);
  render();
}

function renderUniversal(idx){
  var q = UNIVERSAL_Q[idx];
  var offset = mode === 'exp' ? 3 : 2;
  document.getElementById('card').innerHTML = 
    '<div class="badge s2">' + q.badge + '</div>' +
    '<div class="q-label">Step ' + (offset + idx + 1) + ' · General Preference ' + (idx+1) + '/5</div>' +
    '<div class="q-title">' + q.q + '</div>' +
    '<div class="options">' + q.opts.map(function(o,i){
      return '<div class="opt'+(universalAnswers[idx]===i?' picked':'')+'" onclick="universalAnswers['+idx+']='+i+';step++;render()">'+o.t+'</div>';
    }).join('') + '</div>' +
    '<div class="nav">' +
      '<button class="btn btn-back" onclick="step'+(idx===0?'--':'--')+';render()">← ' + (idx===0?'Scenario':'Previous') + '</button>' +
      '<span class="btn-skip" onclick="universalAnswers['+idx+']=-1;step++;render()">Skip</span>' +
      '<span></span>' +
    '</div>';
}

function renderSceneQ(idx){
  var qs = SCENE_Q[sceneId];
  if(!qs||idx>=qs.length){showResult();return}
  var q = qs[idx];
  var isFill = q.type==='fill';
  var offset = mode === 'exp' ? 8 : 7;
  document.getElementById('card').innerHTML = 
    '<div class="badge s3">' + q.badge + '</div>' +
    '<div class="q-label">Step ' + (offset + idx + 1) + ' · ' + q.badge + ' ' + (idx+1) + '/' + qs.length + (isFill?'':' (click to auto-advance)') + '</div>' +
    '<div class="q-title">' + q.q + '</div>' +
    (isFill ? 
      '<textarea class="fill-input" id="fillInput" placeholder="' + (q.placeholder||'') + '" oninput="sceneAnswers['+idx+']=this.value">' + (sceneAnswers[idx]||'') + '</textarea>' +
      (q.examples?'<div class="fill-hint">💡 Examples: ' + q.examples.map(function(e){return '"'+e+'"';}).join(', ') + '</div>':'')
    : 
      '<div class="options">' + q.opts.map(function(o,i){
        return '<div class="opt'+(sceneAnswers[idx]===i?' picked':'')+'" onclick="sceneAnswers['+idx+']='+i+';step++;render()">'+o.t+'</div>';
      }).join('') + '</div>'
    ) +
    '<div class="nav">' +
      '<button class="btn btn-back" onclick="step--;render()">← Previous</button>' +
      (!isFill && idx<qs.length-1 ? '<span class="btn-skip" onclick="sceneAnswers['+idx+']=-1;step++;render()">Skip</span>' : '') +
      (isFill ? '<button class="btn btn-next s3" onclick="step++;render()">' + (idx===qs.length-1?'Generate Profile ✨':'Next →') + '</button>' : '') +
    '</div>';
  if(isFill) document.getElementById('fillInput') && document.getElementById('fillInput').focus();
}

function showResult(){
  document.getElementById('card').innerHTML = '';
  document.getElementById('promptBox').textContent = buildPrompt();
  document.getElementById('result').classList.add('visible');
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
  var dots = document.querySelectorAll('.progress-dot');
  for(var i = 0; i < dots.length; i++) { dots[i].classList.add('done'); }
}

function copyPrompt(){
  var t = document.getElementById('promptBox').textContent;
  try{navigator.clipboard.writeText(t)}
  catch(e){var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta)}
  showToast('✅ Copied! Paste into any AI tool\'s system prompt');
}

function resetAll(){
  step=0;mode=null;sceneId=null;birth={};universalAnswers=[];sceneAnswers=[];
  document.getElementById('result').classList.remove('visible');
  render();
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2500)}
render();
</script>
</body>
</html>
